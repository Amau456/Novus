<nav class="navbar">
  <div class="logo">
    <img src="assets/Imagenes/Logo.png" alt="Logo de Novus">
  </div>

  <ul class="menu">
    <li><a routerLink="/home">Inicio</a></li>
    <li><a routerLink="/inicio">Catálogo</a></li>
    <li><a routerLink="/contactanos">Contáctanos</a></li>
    <li><a routerLink="/reservas">Reservas</a></li>
    <li *ngIf="usuario && usuario.id_rol !== 4">
      <a routerLink="/mecanico">Mecánico</a>
    </li>
  </ul>

  <button class="btn" *ngIf="!usuario" (click)="openLogin()">
    Iniciar sesión
  </button>

  <div class="usuario" *ngIf="usuario">
    <span class="material-icons">account_circle</span>
    <span>{{ usuario.nombre }}</span>
    <button class="btnSalir" (click)="cerrarSesion()">Cerrar sesión</button>
  </div>
</nav>

<router-outlet></router-outlet>

<div class="overlay" *ngIf="isLoginOpen" (click)="closeLogin()">
  
  <div class="modal" (click)="$event.stopPropagation()">
    
    <button class="btn-cerrar-x" (click)="closeLogin()" title="Cerrar">
      <span class="material-icons">close</span>
    </button>

    <img class="logop" src="assets/Imagenes/Logo1.png" alt="Logo de Novus">
   
    <div class="form-container" *ngIf="modo === 'login'">
      <h2 class="text">Iniciar sesión</h2>
      
      <input class="casilla" type="email" placeholder="Correo" [(ngModel)]="login.correo">
      <input class="casilla" type="password" placeholder="Contraseña" [(ngModel)]="login.contrasena">
      
      <div class="buttons">
        <button class="Ing" (click)="iniciarSesion()">Ingresar al sistema</button>
        <button class="btn-secundario" (click)="closeLogin()">Cancelar</button>
        
        <div class="forgot">
          <span class="text-small">¿No tienes una cuenta?</span>
          <button class="for" (click)="cambiarRegistro()">Regístrate aquí</button>
        </div>
      </div>
    </div>
   
    <div class="form-container" *ngIf="modo === 'registro'">
      <h2 class="text">Crear cuenta</h2>
      
      <input class="casilla" type="text" placeholder="Nombre" [(ngModel)]="registro.nombre">
      <input class="casilla" type="text" placeholder="Apellido paterno" [(ngModel)]="registro.ap_pat">
      <input class="casilla" type="text" placeholder="Apellido materno" [(ngModel)]="registro.ap_mat">
      <input class="casilla" type="email" placeholder="Correo electrónico" [(ngModel)]="registro.correo">
      <input class="casilla" type="tel" placeholder="Teléfono" maxlength="10" [(ngModel)]="registro.telefono">
      <input class="casilla" type="password" placeholder="Contraseña" [(ngModel)]="registro.contrasena">
      
      <div class="buttons">
        <button class="Ing" (click)="registrarUsuario()">Crear cuenta</button>
        <button class="btn-secundario" (click)="cambiarLogin()">Volver al login</button>
      </div>
    </div>
   
    <p class="mensaje-alerta" *ngIf="mensaje">
      {{ mensaje }}
    </p>
  </div>
</div>
